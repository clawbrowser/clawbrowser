name: Publish Docker image

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish. Leave empty to use the latest release or tag.
        required: false
        type: string
      publish_latest:
        description: Also publish the latest tag
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: docker-publish-${{ github.event.release.tag_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  resolve_publish_target:
    name: Resolve Docker publish target
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}
      publish_latest: ${{ steps.vars.outputs.publish_latest }}
    steps:
      - id: vars
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          INPUT_PUBLISH_LATEST: ${{ inputs.publish_latest }}
          INPUT_TAG: ${{ inputs.tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail

          repo_name="${GITHUB_REPOSITORY#*/}"
          repo_name="$(printf '%s' "${repo_name}" | tr '[:upper:]' '[:lower:]')"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            tag="${INPUT_TAG}"
            publish_latest="${INPUT_PUBLISH_LATEST}"

            if [[ -z "${tag}" ]]; then
              tag="$(gh release list \
                --repo "${GITHUB_REPOSITORY}" \
                --limit 1 \
                --json tagName \
                --jq '.[0].tagName' || true)"
            fi

            if [[ -z "${tag}" ]]; then
              tag="$(gh api \
                "repos/${GITHUB_REPOSITORY}/tags" \
                --jq '.[0].name' || true)"
            fi
          else
            tag="${RELEASE_TAG}"
            if [[ "${RELEASE_PRERELEASE}" == "true" ]]; then
              publish_latest="false"
            else
              publish_latest="true"
            fi
          fi

          if [[ -z "${tag}" ]]; then
            echo "::error::unable to resolve a release tag; specify tag manually or create a tag first"
            exit 1
          fi

          echo "Resolved tag: ${tag}"

          echo "image=docker.io/clawbrowser/${repo_name}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${publish_latest}" >> "${GITHUB_OUTPUT}"

  publish_multiarch_image:
    name: Build and publish multi-arch Docker image
    needs: resolve_publish_target
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Docker build source
        uses: actions/checkout@v4

      - name: Enable arm64 emulation
        uses: docker/setup-qemu-action@v3

      - name: Create Docker Buildx builder
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: clawbrowser
          password: ${{ secrets.DOCKER_REGISTRY_TOKEN }}

      - name: Download Linux release archives
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve_publish_target.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/assets"
          releases_json="$(gh api \
            "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
            --paginate \
            --slurp)"

          for asset_name in clawbrowser-linux-x64.tar.gz clawbrowser-linux-arm64.tar.gz; do
            asset_url="$(printf '%s' "${releases_json}" | jq -r \
              --arg tag "${RELEASE_TAG}" \
              --arg asset "${asset_name}" '
                map(.[]?) |
                map(select(.tag_name == $tag)) |
                map(select(any((.assets // [])[]; .name == $asset))) |
                sort_by(.draft) |
                first? |
                (.assets // [])[] |
                select(.name == $asset) |
                .url // empty
              ')"

            if [[ -z "${asset_url}" ]]; then
              echo "::error::asset ${asset_name} was not found in any release for tag ${RELEASE_TAG}"
              printf '%s' "${releases_json}" | jq -r \
                --arg tag "${RELEASE_TAG}" '
                  map(.[]?) |
                  map(select(.tag_name == $tag)) |
                  .[] |
                  "- release=\(.name) draft=\(.draft) assets=\([(.assets // [])[].name] | join(", "))"
                '
              exit 1
            fi

            gh api "${asset_url}" \
              -H "Accept: application/octet-stream" \
              > "${RUNNER_TEMP}/assets/${asset_name}"
          done

      - name: Assemble Docker build roots
        run: |
          set -euo pipefail

          rm -rf clawbrowser-dist-amd64 clawbrowser-dist-arm64

          prepare_dist() {
            local arch="$1"
            local asset_name="$2"
            local archive="${RUNNER_TEMP}/assets/${asset_name}"
            local extract_dir="${RUNNER_TEMP}/clawbrowser-dist-${arch}"
            local dest_dir="clawbrowser-dist-${arch}"
            local src
            local real_path
            local -a real_paths

            rm -rf "${dest_dir}" "${extract_dir}"
            mkdir -p "${dest_dir}" "${extract_dir}"

            tar -xzf "${archive}" -C "${extract_dir}"

            real_paths=()
            while IFS= read -r real_path; do
              real_paths+=("${real_path}")
            done < <(find "${extract_dir}" -type f -name clawbrowser.real | sort)
            if [[ ${#real_paths[@]} -ne 1 ]]; then
              echo "::error::expected exactly one clawbrowser.real in ${asset_name}, found ${#real_paths[@]}"
              find "${extract_dir}" -maxdepth 3 -type f | sort | sed 's/^/- /'
              exit 1
            fi

            src="$(dirname "${real_paths[0]}")"

            cp -a "${src}/." "${dest_dir}/"

            if [[ ! -f "${dest_dir}/clawbrowser.real" ]]; then
              echo "::error::expected ${dest_dir}/clawbrowser.real in ${asset_name}"
              exit 1
            fi

            chmod +x "${dest_dir}/clawbrowser.real"
          }

          prepare_dist amd64 clawbrowser-linux-x64.tar.gz
          prepare_dist arm64 clawbrowser-linux-arm64.tar.gz

      - name: Generate Docker image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=false
          images: ${{ needs.resolve_publish_target.outputs.image }}
          tags: |
            type=raw,value=${{ needs.resolve_publish_target.outputs.tag }}
            type=raw,value=latest,enable=${{ needs.resolve_publish_target.outputs.publish_latest == 'true' }}

      - name: Build and publish amd64 and arm64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Verify published multi-arch manifest
        env:
          IMAGE: ${{ needs.resolve_publish_target.outputs.image }}
          TAG: ${{ needs.resolve_publish_target.outputs.tag }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE}:${TAG}"
