name: clawbrowser
version: 1.0.0
description: >-
  Managed Clawbrowser runtime for agent tasks. Lifecycle and identity
  come from CLI/MCP, page automation comes from CDP, CDP endpoints are
  temporary runtime handles, and clawbrowser://verify/ is the proof
  source for fingerprint/proxy state.
author: Clawbrowser
provides_tools:
  - clawbrowser_start
  - clawbrowser_endpoint
  - clawbrowser_rotate
  - clawbrowser_open_url
  - clawbrowser_list_tabs
  - clawbrowser_close_tabs
  - clawbrowser_stop
  - clawbrowser_status
provides_hooks:
  - pre_llm_call
  - post_tool_call
