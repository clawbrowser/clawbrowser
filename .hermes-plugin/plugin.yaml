name: clawbrowser
version: 1.0.0
description: >-
  Agent-only browser runtime with fingerprints, proxies, and rotating
  identities. Manages CDP sessions without touching the user's personal
  browser profile.
author: Clawbrowser
provides_tools:
  - clawbrowser_start
  - clawbrowser_endpoint
  - clawbrowser_rotate
  - clawbrowser_open_url
  - clawbrowser_list_tabs
  - clawbrowser_close_tabs
  - clawbrowser_stop
  - clawbrowser_status
provides_hooks:
  - pre_llm_call
  - post_tool_call
