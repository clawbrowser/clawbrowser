<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <title>Clawbrowser Side Bite</title>
  <defs>
    <linearGradient id="tileFill" x1="40" y1="18" x2="216" y2="238" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111111"/>
      <stop offset="0.55" stop-color="#050505"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="tileStroke" x1="38" y1="15" x2="218" y2="241" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6A6A6A"/>
      <stop offset="0.45" stop-color="#262626"/>
      <stop offset="1" stop-color="#3A3A3A"/>
    </linearGradient>
    <radialGradient id="circleFill" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(154 113) rotate(51.3402) scale(64.4)">
      <stop offset="0" stop-color="#F8F8F8"/>
      <stop offset="0.52" stop-color="#EEEEEE"/>
      <stop offset="1" stop-color="#CFCFCF"/>
    </radialGradient>
    <filter id="tileShadow" x="8" y="10" width="240" height="240" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.45"/>
      <feDropShadow dx="0" dy="-1" stdDeviation="1" flood-color="#FFFFFF" flood-opacity="0.08"/>
    </filter>
    <filter id="circleInset" x="120" y="86" width="90" height="90" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1" stdDeviation="1.4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#tileFill)" filter="url(#tileShadow)"/>
  <rect x="17.5" y="17.5" width="221" height="221" rx="54.5" stroke="url(#tileStroke)" stroke-width="3"/>
  <rect x="22.5" y="22.5" width="211" height="211" rx="49.5" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="165" cy="128" r="42" fill="#0D0D0D" opacity="0.9"/>
  <circle cx="165" cy="128" r="40" fill="url(#circleFill)" stroke="#282828" stroke-width="2" filter="url(#circleInset)"/>
  <circle cx="154" cy="117" r="8" fill="#FFFFFF" opacity="0.1"/>
</svg>
